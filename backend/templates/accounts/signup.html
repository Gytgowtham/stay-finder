{% extends "accounts/base.html" %}
{% load static %}

{% block content %}

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height:80vh;">

        <div class="col-md-5 col-lg-4">

            <div class="card p-4 shadow animate__animated animate__fadeIn">

                <h3 class="text-center mb-4">Create Account</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <input type="text" 
                               name="username"
                               class="form-control"
                               placeholder="Username"
                               required>
                    </div>

                    <div class="mb-3">
                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Email"
                               required>
                    </div>

                    <div class="mb-3">
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Password"
                               required>
                    </div>

                    <button type="submit" class="btn btn-dark">
                        Create Account
                    </button>

                </form>

                <p class="text-center mt-3">
                    Already have account?
                    <a href="/">Login</a>
                </p>

            </div>

        </div>

    </div>
</div>

{% endblock %}
